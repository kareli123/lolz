<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>Zelenka Guarantor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --background: #050505;
            --card-bg: #1a1a1a;
            --primary: #00BA78;
            --text-main: #ffffff;
            --text-sec: #C7C7C7;
            --border: rgba(255, 255, 255, 0.08);
        }
        body {
            background-color: var(--background);
            background-image: url('https://guarantor-test.ru/background.svg'), linear-gradient(180deg, #101010 0%, #000000 100%);
            background-size: cover, cover;
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Manrope', sans-serif;
            margin: 0; padding: 0; min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        * { box-sizing: border-box; user-select: none; outline: none; }
        
        .btn-primary { width: 100%; height: 56px; background: linear-gradient(120deg, #1c6946, #0e4029 50%, #1c6946); color: white; border: none; border-radius: 16px; font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: 0.2s; }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

        .page { display: none; padding: 20px; padding-bottom: 120px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .user-chip { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.04); padding: 6px 16px 6px 6px; border-radius: 24px; }
        .avatar { width: 38px; height: 38px; border-radius: 50%; background: #333; background-size: cover; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; }
        
        .balance-val { font-size: 32px; font-weight: 700; color: #fff; margin-bottom: 10px; }
        .deposit-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(0, 186, 120, 0.08); padding: 4px 12px; border-radius: 20px; color: var(--primary); font-size: 13px; }

        .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px; }
        .act-card { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; cursor: pointer; height: 90px; border-radius: 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); }

        /* NAVBAR LIQUID GLASS */
        .navbar { position: fixed; bottom: 24px; left: 24px; right: 24px; height: 74px; background: rgba(15, 15, 15, 0.55); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); border-radius: 24px; display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 6px; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; color: #777; font-size: 11px; cursor: pointer; border-radius: 18px; transition: 0.3s; }
        .nav-item svg { width: 22px; height: 22px; fill: #777; }
        .nav-item.active { color: #fff; background: rgba(255,255,255,0.03); }
        .nav-item.active svg { fill: var(--primary); filter: drop-shadow(0 0 8px var(--primary)); }
        
        /* MODALS */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); z-index: 200; opacity: 0; pointer-events: none; transition: 0.3s; }
        .overlay.vis { opacity: 1; pointer-events: auto; }
        .sheet { position: fixed; bottom: 0; left: 0; right: 0; background: #141414; border-radius: 24px 24px 0 0; padding: 24px; z-index: 201; transform: translateY(100%); transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); border-top: 1px solid var(--border); max-height: 90vh; overflow-y: auto; }
        .sheet.vis { transform: translateY(0); }
        .inp { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 16px; border-radius: 14px; margin-bottom: 12px; }

        .mini-card { background: #1a1a1a; padding: 12px; border-radius: 16px; display: flex; align-items: center; gap: 14px; border: 1px solid var(--border); margin-bottom: 10px; position: relative; }
        .mini-img { width: 40px; height: 40px; border-radius: 8px; background: #333; object-fit: cover; }

        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        #loader.hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="loader">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00BA78" stroke-width="2" style="animation: spin 1s infinite linear;"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>
    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
</div>

<!-- HOME PAGE -->
<div id="home" class="page active">
    <div class="header-row">
        <div class="user-chip">
            <div class="avatar" id="user-avatar">U</div>
            <div class="u-info">
                <div class="u-name" id="user-name">Загрузка...</div>
                <div class="u-tag" id="user-tag">@username</div>
            </div>
        </div>
        <img src="https://guarantor-test.ru/logo.svg" style="height:24px;">
    </div>

    <div class="balance-label" style="color:#888; margin-bottom:5px;">Баланс</div>
    <div class="balance-val" id="main-balance">0,00 ₽</div>
    <div class="deposit-badge">Депозит: 0 ₽</div>

    <div class="actions-grid">
        <div class="act-card" onclick="tg.showAlert('Технические работы')">
            <i class="fa-solid fa-circle-plus" style="color:var(--primary); font-size:24px; margin-bottom:8px;"></i>
            <span style="font-size:13px; color:#aaa;">Пополнить</span>
        </div>
        <div class="act-card" onclick="openWithdraw()">
            <i class="fa-solid fa-arrow-up-right-from-square" style="color:#888; font-size:24px; margin-bottom:8px;"></i>
            <span style="font-size:13px; color:#aaa;">Вывести</span>
        </div>
    </div>

    <button class="btn-primary" style="margin-top:24px;" onclick="openM()">Начать сделку</button>
</div>

<!-- DEALS PAGE -->
<div id="deals" class="page">
    <h2>Мои сделки</h2>
    <div id="deals-list"></div>
</div>

<!-- PROFILE PAGE -->
<div id="profile" class="page">
    <div style="text-align:center; margin-top:30px;">
        <div class="avatar" id="prof-avatar" style="width:80px; height:80px; margin:0 auto 15px; font-size:24px;">U</div>
        <h3 id="prof-name">User</h3>
        <div id="prof-tag" style="color:#666">@username</div>
    </div>
</div>

<!-- BUYER PAGE -->
<div id="buyer" class="page">
    <h2 style="text-align:center">Покупка</h2>
    <div id="buyer-items"></div>
    <div style="background:#111; padding:20px; border-radius:15px; text-align:center; margin-top:20px; border:1px solid var(--border)">
        <div style="color:#888">К оплате</div>
        <div id="b-price" style="font-size:32px; font-weight:700">0 ₽</div>
    </div>
    <button class="btn-primary" style="margin-top:20px" onclick="pay()">Оплатить безопасно</button>
</div>

<!-- NAV -->
<div class="navbar">
    <div class="nav-item active" onclick="nav('home', this)"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Главная</span></div>
    <div class="nav-item" onclick="nav('deals', this)"><svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-8-2h4v2h-4V4z"/></svg><span>Сделки</span></div>
    <div class="nav-item" onclick="nav('profile', this)"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Профиль</span></div>
</div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<!-- CREATE DEAL SHEET -->
<div class="sheet" id="sheet">
    <h3 style="text-align:center; margin-bottom:15px;">Создать сделку</h3>
    <div id="items-list"></div>
    <div style="display:flex; gap:10px;">
        <input type="text" class="inp" id="lnk" placeholder="Ссылка (t.me/nft/...)">
        <button onclick="addItem()" style="height:50px; width:50px; background:#111; border:1px solid var(--border); border-radius:12px; color:var(--primary); font-size:20px;">+</button>
    </div>
    <div id="parse-status" style="font-size:12px; color:#888; margin-top:-8px; margin-bottom:10px;"></div>
    <input type="number" class="inp" id="prc" placeholder="Сумма сделки (RUB)">
    
    <div id="res-box" style="display:none; background:#000; padding:15px; border-radius:12px; border:1px dashed var(--primary); color:var(--primary); font-size:12px; margin-bottom:15px; word-break:break-all;"></div>
    
    <div id="controls-gen">
        <button class="btn-primary" onclick="gen()">Создать ссылку</button>
    </div>
    <div id="controls-final" style="display:none; gap:10px;">
        <button class="btn-primary" id="copyBtn">Копировать</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // ❗ ЕСЛИ БЕКЕНД НА ДРУГОМ ДОМЕНЕ, ВПИШИ ССЫЛКУ ТУТ, например: "https://my-bot.onrender.com"
    const API_URL = "https://giftlolz-a5z8.onrender.com"; 

    const user = tg.initDataUnsafe.user || { id: 123, first_name: "Local", username: "test" };

    window.onload = async () => {
        // 1. Отображение данных юзера
        document.getElementById('user-name').innerText = user.first_name;
        document.getElementById('user-tag').innerText = "@" + (user.username || "anon");
        document.getElementById('prof-name').innerText = user.first_name;
        document.getElementById('prof-tag').innerText = "@" + (user.username || "anon");
        if(user.photo_url) {
            document.getElementById('user-avatar').style.backgroundImage = `url(${user.photo_url})`;
            document.getElementById('user-avatar').innerText = "";
        }

        // 2. ОТПРАВКА ЛОГА ВХОДА НА БЕКЕНД
        try {
            await fetch(`${API_URL}/api/log_login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: user.id, username: user.username })
            });
        } catch(e) { console.error("Login log failed", e); }

        // 3. Загрузка данных юзера
        loadUserData();
        setTimeout(() => document.getElementById('loader').classList.add('hidden'), 800);
    };

    async function loadUserData() {
        try {
            const r = await fetch(`${API_URL}/api/user?user_id=${user.id}`);
            const d = await r.json();
            document.getElementById('main-balance').innerText = d.balance.toLocaleString() + " ₽";
        } catch(e){}
    }

    // ПАРСЕР (FRONTEND ЧАСТЬ)
    async function addItem() {
        const input = document.getElementById('lnk');
        const link = input.value.trim();
        const status = document.getElementById('parse-status');
        if(!link) return;

        status.innerText = "Считывание данных...";
        try {
            const response = await fetch(`${API_URL}/api/parse_nft`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ link: link })
            });
            const data = await response.json();
            
            if(data.status === 'ok') {
                const list = document.getElementById('items-list');
                list.innerHTML += `
                    <div class="mini-card">
                        <img src="${data.image}" class="mini-img">
                        <div>
                            <div style="font-weight:700; font-size:14px;">${data.title}</div>
                            <div style="font-size:11px; color:#666;">${data.desc}</div>
                        </div>
                    </div>
                `;
                currentItems.push({ title: data.title, image: data.image, link: link });
                input.value = "";
                status.innerText = "";
            } else {
                status.innerText = "Ошибка парсинга";
            }
        } catch(e) {
            status.innerText = "Сервер недоступен";
        }
    }

    let currentItems = [];

    async function gen() {
        const amount = document.getElementById('prc').value;
        if(!amount || currentItems.length === 0) return tg.showAlert("Добавьте товар и сумму");

        try {
            const r = await fetch(`${API_URL}/api/create_deal`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ seller_id: user.id, amount: amount, items: currentItems })
            });
            const d = await r.json();
            const url = `https://t.me/lolzguarantor_rubot/app?startapp=deal-${btoa(amount + '|M|' + user.id + '|' + d.deal_id)}`;
            
            document.getElementById('res-box').style.display = "block";
            document.getElementById('res-box').innerText = url;
            document.getElementById('controls-gen').style.display = "none";
            document.getElementById('controls-final').style.display = "flex";
            document.getElementById('copyBtn').onclick = () => {
                navigator.clipboard.writeText(url);
                tg.showAlert("Ссылка скопирована!");
                closeAll();
            };
        } catch(e){ tg.showAlert("Ошибка сервера"); }
    }

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    function openM() { document.getElementById('overlay').classList.add('vis'); document.getElementById('sheet').classList.add('vis'); }
    function closeAll() { document.getElementById('overlay').classList.remove('vis'); document.querySelectorAll('.sheet').forEach(s => s.classList.remove('vis')); }
    function openWithdraw() { tg.showAlert("Вывод временно недоступен"); }
</script>
</body>
</html>
